<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>黄金矿工 - Canvas 版</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      background: #634021 linear-gradient(#3A2717 0%, #634021 100%);
      margin: 0;
      padding: 0;
      overflow: hidden;
      user-select: none;
    }
    #ui {
      position: absolute;
      left: 0; right: 0; top: 10px; width: 100vw;
      z-index: 2; pointer-events: none;
      color: #fffdd7;
      font-family: '微软雅黑', Arial, sans-serif;
      text-align: center;
      font-size: 20px;
      text-shadow: 2px 2px 8px #2e200f, 0 0 3px #d1a072;
    }
    #restart-btn {
      display: none;
      position: absolute;
      left:50%; top:55%;
      transform:translate(-50%,-50%);
      font-size: 22px;
      background: #fffbe8;
      color: #865c1b;
      border-radius: 8px;
      border: none;
      padding: 14px 40px;
      box-shadow: 0 2px 16px #9d793388;
      cursor: pointer;
    }
    canvas {
      display: block;
      margin: 0 auto;
      background: none;
      z-index: 1;
    }
  </style>
</head>
<body>
<div id="ui">
  <div id="score"></div>
  <div id="timer"></div>
  <div id="target"></div>
</div>
<button id="restart-btn" onclick="location.reload()">重新开始</button>
<canvas id="gameCanvas"></canvas>
<script>
class Item {
  // type: "gold_big","gold_small","stone"
  // emoji: 💰🪙🪨
  // value: 分数
  // mass: 质量
  static CONFIGS = [
    { type: "gold_big", emoji: "💰", value: 500, mass: 5, radius: 36 },
    { type: "gold_small", emoji: "🪙", value: 120, mass: 1, radius: 22 },
    { type: "stone", emoji: "🪨", value: 40, mass: 10, radius: 27 }
  ];
  constructor(x, y, config) {
    this.x = x;
    this.y = y;
    this.type = config.type;
    this.emoji = config.emoji;
    this.value = config.value;
    this.mass = config.mass;
    this.radius = config.radius;
    this.captured = false;
  }
  draw(ctx) {
    ctx.save();
    ctx.font = `${this.radius*1.2}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = this.captured ? 0.4 : 1;
    ctx.fillText(this.emoji, this.x, this.y + 3);
    ctx.restore();
  }
}

class Hook {
  constructor(cx, cy, length, minA, maxA) {
    this.cx = cx; // 钩锚点(centerX)
    this.cy = cy; // 钩锚点(centerY)
    this.length = length;   // 基础长度
    this.angle = 0;         // 当前角度, 单位° 
    this.minAngle = minA; // -70
    this.maxAngle = maxA; // +70
    this.state = 'swing';   // swing, extend, retract
    this.dir = 1;           // 摆动方向(1:右, -1:左）
    this.speed = 6;         // 钩子伸缩速度(像素/帧)
    this.swingSpeed = 1.1;  // 摆动速度(度/帧)
    this.currentLen = this.length; // 当前伸出长度
    this.attachedItem = null;
  }
  update(game) {
    if(this.state === 'swing') {
      this.angle += this.swingSpeed * this.dir;
      if(this.angle <= this.minAngle) {
        this.angle = this.minAngle;
        this.dir = 1;
      } else if(this.angle >= this.maxAngle) {
        this.angle = this.maxAngle;
        this.dir = -1;
      }
      this.currentLen = this.length;
      this.attachedItem = null;
    }
    else if(this.state === 'extend') {
      this.currentLen += this.speed;
      // 与物体碰撞检测
      let hx = this.cx + this.currentLen*Math.sin(this.angle * Math.PI/180);
      let hy = this.cy + this.currentLen*Math.cos(this.angle * Math.PI/180);
      for(let item of game.items) {
        if(item.captured) continue;
        const dist = Math.hypot(hx - item.x, hy - item.y);
        if(dist < item.radius + 16) {
          item.captured = true;
          this.attachedItem = item;
          this.state = 'retract';
          return;
        }
      }
      if(this.outOfBounds(game)) {
        this.state = 'retract';
      }
    }
    else if(this.state === 'retract') {
      // 钩空/抓到物体时速度调整
      let realSpeed = this.speed;
      if(this.attachedItem)
        realSpeed = Math.max(2.5, 18 / this.attachedItem.mass); // 质量大,回收慢
      this.currentLen -= realSpeed;
      // 拖拽物体位置随钩子
      if(this.attachedItem) {
        const x = this.cx + this.currentLen*Math.sin(this.angle*Math.PI/180);
        const y = this.cy + this.currentLen*Math.cos(this.angle*Math.PI/180);
        this.attachedItem.x = x;
        this.attachedItem.y = y;
      }
      if(this.currentLen <= this.length) {
        if(this.attachedItem) {
          game.score += this.attachedItem.value;
          this.attachedItem = null;
        }
        this.state = 'swing';
        this.currentLen = this.length;
      }
    }
  }
  outOfBounds(game) {
    const hx = this.cx + this.currentLen*Math.sin(this.angle * Math.PI/180);
    const hy = this.cy + this.currentLen*Math.cos(this.angle * Math.PI/180);
    return (
      hx < 0 || hx > game.width ||
      hy < this.cy + 6 || hy > game.height
    );
  }
  draw(ctx) {
    // 绘制线、钩子
    ctx.save();
    ctx.strokeStyle = "#f0d573";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(this.cx, this.cy);
    const ex = this.cx + this.currentLen * Math.sin(this.angle * Math.PI/180);
    const ey = this.cy + this.currentLen * Math.cos(this.angle * Math.PI/180);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    // 钩子头
    ctx.translate(ex, ey);
    ctx.rotate(-this.angle * Math.PI/180);
    ctx.beginPath();
    ctx.strokeStyle = "#af7109";
    ctx.lineWidth = 7;
    ctx.arc(0, 13, 15, Math.PI*1.2, Math.PI*1.8, false);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, 13, 0, Math.PI, true);
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#53400d";
    ctx.stroke();
    ctx.restore();
  }
}

class Game {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.width = 820;
    this.height = 540;
    this.score = 0;
    this.target = 1200 + Math.floor(Math.random()*200);
    this.timeLeft = 60;
    this.state = 'playing'; // 'playing','win','lose'
    this.hook = new Hook(this.width/2, 80, 68, -70, 70);
    this.items = [];
    this.uiScore = document.getElementById('score');
    this.uiTimer = document.getElementById('timer');
    this.uiTarget = document.getElementById('target');
    this.restartBtn = document.getElementById('restart-btn');
    this.initItems();
    this._timerHandle = null;
    this._intervalHandle = null;
    this.initUI();
    this.start();
    this.handleInput();
  }
  resize() {
    // 自适应比例
    const W = window.innerWidth, H = window.innerHeight;
    const scale = Math.min(W/this.width, H/this.height, 1);
    this.canvas.width = this.width * window.devicePixelRatio;
    this.canvas.height = this.height * window.devicePixelRatio;
    this.canvas.style.width = this.width*scale + "px";
    this.canvas.style.height = this.height*scale + "px";
    this.ctx.setTransform(window.devicePixelRatio,0,0,window.devicePixelRatio,0,0);
  }
  initItems() {
    // 矿物不重叠
    let tryTimes = 0;
    let items = [];
    const NUM = 10 + Math.floor(Math.random()*6);
    while(items.length < NUM && tryTimes<1000) {
      tryTimes++;
      // 1/3大金, 2/3小金, 1/3石头
      let confId = Math.random();
      let c;
      if(confId < 0.18) c = Item.CONFIGS[0];
      else if(confId < 0.62) c = Item.CONFIGS[1];
      else c = Item.CONFIGS[2];
      let r = c.radius;
      let x = 80 + Math.random()*(this.width-160);
      let y = 200 + Math.random()*(this.height-180);
      let item = new Item(x,y,c);
      // 不重叠判断
      let ok=true;
      for(let other of items) {
        if(Math.hypot(item.x-other.x, item.y-other.y) <= item.radius+other.radius+12)
          ok = false;
      }
      if(ok) items.push(item);
    }
    this.items = items;
  }
  initUI() {
    this.uiScore.innerHTML = `得分：<b>${this.score}</b>`;
    this.uiTarget.innerHTML = `目标：${this.target}`;
    this.uiTimer.innerHTML = `剩余时间：<b>${this.timeLeft}</b> 秒`;
    this.restartBtn.style.display = "none";
  }
  start() {
    this.resize();
    window.addEventListener('resize', ()=>this.resize());
    clearInterval(this._intervalHandle);
    this._intervalHandle = setInterval(()=>this.loop(),1000/60);
    clearInterval(this._timerHandle);
    this._timerHandle = setInterval(()=>{
      if(this.state!=='playing') return;
      if(--this.timeLeft<=0) {
        this.timeLeft = 0;
        this.end();
      }
      this.uiTimer.innerHTML = `剩余时间：<b>${this.timeLeft}</b> 秒`;
    }, 1000);
  }
  handleInput() {
    // 修复：keydown 只切换钩子状态为"extend"，不处理其它情况
    window.addEventListener('keydown', (e)=>{
      if(e.code=="Space" && this.state==='playing' && this.hook.state==='swing') {
        this.hook.state = 'extend';
      }
      // 支持R键重开
      else if(e.code==="KeyR" && this.state!=='playing'){
        location.reload();
      }
    });
    // 修复部分PC空格无效，允许canvas聚焦后空格生效
    document.body.tabIndex = -1;
    document.body.addEventListener('keydown', (e)=>{
      if(e.code=="Space" && this.state==='playing' && this.hook.state==='swing') {
        this.hook.state = 'extend';
      }
    });
  }
  end() {
    this.state = (this.score >= this.target) ? "win" : "lose";
    clearInterval(this._intervalHandle);
    clearInterval(this._timerHandle);
    setTimeout(()=>{
      this.restartBtn.style.display="block";
      this.restartBtn.innerText = (this.state==='win'?'🎉通过，':'未完成，')+'再试一次(R)';
    },350);
  }
  drawBackground() {
    // 深褐色渐变
    let g = this.ctx.createLinearGradient(0,0,0,this.height);
    g.addColorStop(0,"#3a2717");
    g.addColorStop(1,"#634021");
    this.ctx.fillStyle = g;
    this.ctx.fillRect(0, 0, this.width, this.height);

    // 网格
    this.ctx.save();
    this.ctx.globalAlpha = 0.13;
    this.ctx.strokeStyle = "#fff8e2";
    this.ctx.lineWidth = 1;
    for (let x = 60; x < this.width; x += 48) {
      this.ctx.beginPath();
      this.ctx.moveTo(x,150);
      this.ctx.lineTo(x,this.height-4);
      this.ctx.stroke();
    }
    for (let y = 180; y < this.height; y += 40) {
      this.ctx.beginPath();
      this.ctx.moveTo(12,y);
      this.ctx.lineTo(this.width-12, y);
      this.ctx.stroke();
    }
    this.ctx.restore();
  }
  drawMiner() {
    this.ctx.save();
    this.ctx.font = '48px serif';
    this.ctx.textAlign = 'center';
    this.ctx.textBaseline = 'middle';
    this.ctx.fillText('🤠', this.width/2, 54);
    this.ctx.restore();
  }
  loop() {
    // draw
    this.drawBackground();
    for(let i of this.items) i.draw(this.ctx);
    this.drawMiner();
    this.hook.update(this);
    this.hook.draw(this.ctx);

    // UI
    this.uiScore.innerHTML = `得分：<b>${this.score}</b>`;
    if(this.state==='win'){
      this.ctx.save();
      this.ctx.font = "50px '微软雅黑',serif";
      this.ctx.fillStyle = "#ffffe5";
      this.ctx.strokeStyle="#865c1b";
      this.ctx.lineWidth=5;
      this.ctx.textAlign='center';
      this.ctx.textBaseline='middle';
      this.ctx.strokeText('🎉 恭喜通过目标!', this.width/2,this.height/2-30);
      this.ctx.fillText('🎉 恭喜通过目标!', this.width/2,this.height/2-30);
      this.ctx.restore();
    } else if(this.state==='lose'){
      this.ctx.save();
      this.ctx.font = "50px '微软雅黑',serif";
      this.ctx.fillStyle = "#fff";
      this.ctx.strokeStyle="#552";
      this.ctx.lineWidth=6;
      this.ctx.textAlign='center';
      this.ctx.textBaseline='middle';
      this.ctx.strokeText('未达标，再来一次！', this.width/2,this.height/2-30);
      this.ctx.fillText('未达标，再来一次！', this.width/2,this.height/2-30);
      this.ctx.restore();
    }
  }
}

const canvas = document.getElementById('gameCanvas');
let game = new Game(canvas);
window.game = game;

</script>
